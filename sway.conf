# set {{{
set { 
	$bemenu bemenu-run --fn "$font" -n -p "bemenu" | xargs swaymsg exec
	$border_width 2 
	$font FantasqueSansMono Nerd Font 
	$mod Mod4 
	$opacity 1
	$rofi_menu rofi -modi drun -show drun -hide-scrollbar -show-icons -lines 1 -width 20 -location 0 -padding 2 
	$wall ~/foo/Wall.jpg
  $backlight_seek 500
  $dmenu --no-startup-id dmenu_run -i -fn "$font" -p "dmenu" -b 
  $lock swaylock --screenshots --fade-in 0.5 --clock --grace 10 --grace-no-mouse --effect-blur 5x5
  $term alacritty
  $vol_seek 5
}
# }}}

# bindsym {{{
bindsym $mod+Return exec alacritty
bindsym $mod+grave exec $lock

bindsym $mod+i exec $rofi_menu
bindsym $mod+d exec $bemenu

bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus scratchpad show

bindsym Print exec grim -g "$(slurp)" - | swappy -f -
bindsym $mod+Print exec grim - | swappy -f -
# }}}

# exec {{{
exec {
  # /usr/bin/python3 ~/.local/bin/flashfocus
  --no-startup-id mako
  --no-startup-id nm-applet
  /usr/bin/python3 ~/.local/bin/autotiling
  # /usr/bin/python3 ~/foo/scripts/swayfader.py
  swayidle -w $lock
}
# }}}

# bar {{{
bar {
    wrap_scroll yes
    position top
    status_command while ~/.config/sway/status.sh; do sleep 1; done
    # hidden_state hide
    # mode hide
    modifier Mod1
    colors {
        statusline #999999
        background #2c2c34
    }
    font pango:$font
}
# }}}

# defaults {{{
set {
  $cl_back #000000
  $cl_fore #1aaa3a
  $cl_high #faba0a
  $cl_indi #faba0a
  $cl_urge #a5da00
}

smart_gaps on
gaps inner 10
gaps outer 10

for_window {
  [class=".*"] opacity $opacity
  [app_id=".*"] opacity $opacity
}

floating_modifier $mod

# Colors                border   bg       text     indi     childborder

client.focused          $cl_high $cl_high $cl_fore $cl_indi $cl_high
client.focused_inactive $cl_back $cl_back $cl_fore $cl_back $cl_back
client.unfocused        $cl_back $cl_back $cl_fore $cl_back $cl_back
client.urgent           $cl_urge $cl_urge $cl_fore $cl_urge $cl_urge

# exec ~/.azotebg # output * bg $wall fill

font $font Bold 12

default_border pixel $border_width
hide_edge_borders smart

workspace_auto_back_and_forth yes
workspace_layout default

bindsym XF86AudioMicMute exec amixer sset Capture toggle

bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +$vol_seek%
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -$vol_seek%
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle

bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl s $backlight_seek-
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl s $backlight_seek+

bindsym $mod+b workspace back_and_forth

bindsym $mod+a focus parent
bindsym $mod+shift+q kill
bindsym $mod+j focus left
bindsym $mod+k focus down
bindsym $mod+l focus up
bindsym $mod+semicolon focus right
bindsym $mod+shift+j move left
bindsym $mod+shift+k move down
bindsym $mod+shift+l move up
bindsym $mod+shift+semicolon move right
bindsym $mod+v split h
bindsym $mod+h split v
bindsym $mod+f fullscreen toggle
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+shift+space floating toggle
bindsym $mod+space focus mode_toggle

set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws10

bindsym $mod+shift+1 move container to workspace number $ws1
bindsym $mod+shift+2 move container to workspace number $ws2
bindsym $mod+shift+3 move container to workspace number $ws3
bindsym $mod+shift+4 move container to workspace number $ws4
bindsym $mod+shift+5 move container to workspace number $ws5
bindsym $mod+shift+6 move container to workspace number $ws6
bindsym $mod+shift+7 move container to workspace number $ws7
bindsym $mod+shift+8 move container to workspace number $ws8
bindsym $mod+shift+9 move container to workspace number $ws9
bindsym $mod+shift+0 move container to workspace number $ws10

bindsym $mod+shift+c reload
bindsym $mod+shift+r restart
bindsym $mod+shift+e exec swaymsg 'exit'

mode "resize" {
        bindsym j resize shrink width 10 px or 10 ppt
        bindsym k resize grow height 10 px or 10 ppt
        bindsym l resize shrink height 10 px or 10 ppt
        bindsym semicolon resize grow width 10 px or 10 ppt
        bindsym return mode "default"
        bindsym escape mode "default"
        bindsym $mod+r mode "default"
}

bindsym $mod+r mode "resize"
# }}}

